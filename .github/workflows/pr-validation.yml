name: PR Validation (Smoke Test)

on:
  pull_request:
    branches: [ master ]
jobs:
  docker-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose Syntax
        run: docker compose config -q

      - name: Create required directories/files for mounts
        run: |
          mkdir -p healthchecks
          touch healthchecks/postgres.sh healthchecks/redis.sh
          chmod +x healthchecks/*.sh

      - name: Build and Start Stack
        run: |
          docker compose up -d --build --wait

      - name: Check Container Status
        if: always()
        run: docker compose ps

      - name: Verify BFF Health
        run: |
          curl -f http://localhost:5001/mdb/actuator/health || (docker compose logs bff && exit 1)

      - name: Shutdown and Cleanup
        if: always()
        run: docker compose down -v
