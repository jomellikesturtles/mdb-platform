# version: "3.8"
services:
  # Infrastructure

  traefik:
    image: traefik:v3.6
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--configFile=traefik.yml" # Point to config
    ports:
      - "80:80"
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # kafka:
  #   ports:
  #     - "8092:8080"
  # rabbitmq:
  #   ports:
  #     - "8484:8080"
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "127.0.0.1:8484:8080"
    command: start-dev
  # MinIO:
  #   ports:
  #     - "9001:9000"
  redis:
    image: redis:alpine
    volumes:
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/redis.sh
      interval: 5s
    ports:
      - 6379:6379
    networks:
      - back-tier
  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "mdb_prod"
    volumes:
      - "db-data:/var/lib/postgresql/data"
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/postgres.sh
      interval: 5s
    ports:
      - 5433:5432
    networks:
      - back-tier
  #
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: global-service-kafka
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://global-service-kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@global-service-kafka:29093"
      # Bind to 0.0.0.0 so Kafka accepts traffic from outside the container
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks:
      - back-tier

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "9094:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: global-service-kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - back-tier
  # portainer:
  #   image: portainer/portainer-ce:latest
  #   container_name: portainer
  #   restart: always
  #   ports:
  #     - "9443:9443"
  #     - "9000:9000"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - portainer_data:/data
  #   networks:
  #     - back-tier

  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana-storage:/var/lib/grafana

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9091:9090"
    restart: always

  # Web apps

  web:
    build: ./mdb-electron
    ports:
      - "4001:80"
    volumes:
      - ./mdb-electron/dist/mdb-electron:/usr/share/nginx/html
  admin-web:
    build: ./mdb-admin-web-app
    # entrypoint
    ports:
      - 4002:80
    networks:
      - front-tier
      - back-tier
  #   depends_on:
  #     - bff
  overview:
    build: ./mdb-overview
    # entrypoint
    ports:
      - 4003:80
    networks:
      - front-tier

  # API and BFF Layer

  bff:
    image: 145099743252137218288881570337/mdb-api:latest
    ports:
      - 5001:8082
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    #   - media-data-gateway-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/mdb_prod?currentSchema=public
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: dev,asia,local
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVER_SERVLET_CONTEXT_PATH: /mdb
    command:
      [
        "java",
        "-jar",
        "/mdb-0.0.0-SNAPSHOT.jar",
        "--server.servlet.context-path=/mdb",
        "--spring.datasource.url=jdbc:postgresql://postgres-db:5432/mdb_prod?currentSchema=public",
        "--spring.data.redis.host=redis",
        "--spring.data.redis.port=6379",
        "--management.endpoints.web.exposure.include=*",
        "--management.endpoint.health.show-details=always",
      ]
    networks:
      - back-tier
  # admin-bff-service:

  # Domain Services

  media-data-gateway-service:
    build: ./media-data-gateway-service
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/mdb_prod?currentSchema=public
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - 6002:9090
    networks:
      - back-tier
  # user-data-gateway-service:
  #   build: ./user-data-gateway-service
  #   depends_on:
  #     postgres-db:
  #       condition: service_healthy
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/mdb_prod?currentSchema=public
  #     SPRING_DATASOURCE_USERNAME: postgres
  #     SPRING_DATASOURCE_PASSWORD: postgres
  #   ports:
  #     - 6001:9090
  #   networks:
  #     - back-tier

  # Workers and Async Services

  # crawler-service:
  #   build: ./user-data-gateway-service
  #   depends_on:
  #     postgres-db:
  #       condition: service_healthy
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/mdb_prod?currentSchema=public
  #     SPRING_DATASOURCE_USERNAME: postgres
  #     SPRING_DATASOURCE_PASSWORD: postgres
  #   ports:
  #     - 7001:9090
  #   networks:
  #     - back-tier
  # notification-service:
  #   build: ./user-data-gateway-service
  #   depends_on:
  #     postgres-db:
  #       condition: service_healthy
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/mdb_prod?currentSchema=public
  #     SPRING_DATASOURCE_USERNAME: postgres
  #     SPRING_DATASOURCE_PASSWORD: postgres
  #   ports:
  #     - 7002:9090
  #   networks:
  #     - back-tier

volumes:
  db-data:
  portainer_data:
  prometheus_data:
  grafana-storage: {}
networks:
  front-tier:
  back-tier:
